name: feature request
description: suggest an idea for this project
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        thanks for suggesting a feature.

  - type: textarea
    id: problem
    attributes:
      label: problem
      description: what problem does this solve? what are you trying to do?
      placeholder: i'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: proposed solution
      description: what would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: alternatives considered
      description: what workarounds or alternatives have you tried?

  - type: dropdown
    id: area
    attributes:
      label: area
      description: which part of the app does this affect?
      options:
        - editor / codemirror
        - ai / chat
        - vault / file management
        - knowledge graph
        - ui / theming
        - performance
        - other
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: contribution
      description: would you be willing to help implement this?
      options:
        - label: i'd be willing to submit a pr for this
